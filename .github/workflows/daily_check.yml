name: Daily Todoist Check

on:
  schedule:
    - cron: '7 8,15,18 * * *'
      timezone: "Asia/Kuala_Lumpur"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Debug schedule time
        run: |
          echo "GitHub event name: $GITHUB_EVENT_NAME"
          echo "UTC time:"
          date -u
          echo "Malaysia time:"
          TZ=Asia/Kuala_Lumpur date

      - name: Send Todoist report
        env:
          RUN_MODE: send_report
          TODOIST_TOKEN: ${{ secrets.TODOIST_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
